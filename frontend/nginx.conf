server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Using a variable in proxy_pass forces nginx to
    # re-resolve "backend" per request instead of caching the container IP at
    # startup — otherwise every Watchtower/compose recreate of the backend
    # (new IP) leaves nginx proxying to a dead address → permanent 502.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8000;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + health to the backend service
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /health {
        proxy_pass $backend_upstream;
    }
    location /openapi.json {
        proxy_pass $backend_upstream;
    }
    location /docs {
        proxy_pass $backend_upstream;
    }
}
