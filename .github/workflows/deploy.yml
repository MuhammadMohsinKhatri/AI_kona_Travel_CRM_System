# Build backend + frontend images on every push to main and publish them to
# GitHub Container Registry. The VPS runs Watchtower, which polls GHCR and
# auto-pulls + restarts the affected services — pushing to main IS the deploy.
name: build-and-publish

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# One build at a time; a newer push cancels an in-flight older build.
concurrency:
  group: publish-images
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  # GHCR requires a lowercase namespace.
  BACKEND_IMAGE: ghcr.io/muhammadmohsinkhatri/konaice-backend
  FRONTEND_IMAGE: ghcr.io/muhammadmohsinkhatri/konaice-frontend

jobs:
  # Images auto-deploy to production via Watchtower, so nothing gets published
  # unless the suite passes — a red build simply never reaches the VPS.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r backend/requirements.txt pytest
      - name: Run tests
        working-directory: backend
        env:
          CRM_PROVIDER: mock
        run: python -m pytest tests/ -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
